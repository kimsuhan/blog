<!doctype html>

<html class="light" lang="en">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;family=Newsreader:opsz,wght@6-72,400;500&amp;display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
      rel="stylesheet"
    />
    <script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "on-error": "#ffffff",
              "surface-container-low": "#f4f3f3",
              "secondary-fixed-dim": "#c7c6c6",
              "surface-container-lowest": "#ffffff",
              "on-primary-container": "#858383",
              "on-tertiary": "#ffffff",
              "inverse-primary": "#c8c6c5",
              "surface-container-highest": "#e2e2e2",
              "secondary-container": "#e1dfdf",
              "on-tertiary-fixed-variant": "#464747",
              surface: "#f9f9f9",
              "error-container": "#ffdad6",
              "primary-fixed-dim": "#c8c6c5",
              "inverse-on-surface": "#f1f1f1",
              "outline-variant": "#c4c7c7",
              "on-tertiary-fixed": "#1a1c1c",
              "surface-container-high": "#e8e8e8",
              "on-primary-fixed": "#1c1b1b",
              "on-primary": "#ffffff",
              "on-secondary": "#ffffff",
              "surface-container": "#eeeeee",
              "surface-bright": "#f9f9f9",
              "surface-tint": "#5f5e5e",
              "on-error-container": "#93000a",
              tertiary: "#000000",
              "on-primary-fixed-variant": "#474746",
              "surface-variant": "#e2e2e2",
              secondary: "#5e5e5e",
              "inverse-surface": "#2f3131",
              "on-secondary-fixed-variant": "#464747",
              "primary-fixed": "#e5e2e1",
              "on-tertiary-container": "#838484",
              outline: "#747878",
              "on-surface": "#1a1c1c",
              "on-secondary-container": "#626262",
              background: "#f9f9f9",
              "primary-container": "#1c1b1b",
              "surface-dim": "#dadada",
              "on-secondary-fixed": "#1b1c1c",
              primary: "#000000",
              "tertiary-fixed": "#e3e2e2",
              error: "#ba1a1a",
              "tertiary-fixed-dim": "#c7c6c6",
              "tertiary-container": "#1a1c1c",
              "on-surface-variant": "#444748",
              "secondary-fixed": "#e4e2e2",
              "on-background": "#1a1c1c",
            },
            borderRadius: {
              DEFAULT: "0.25rem",
              lg: "0.5rem",
              xl: "0.75rem",
              full: "9999px",
            },
            spacing: {
              md: "16px",
              xs: "4px",
              xl: "64px",
              sm: "8px",
              lg: "32px",
              "container-max": "800px",
              gutter: "24px",
              unit: "4px",
            },
            fontFamily: {
              metadata: ["Inter"],
              "label-caps": ["Inter"],
              "headline-md": ["Newsreader"],
              "body-lg": ["Inter"],
              "display-lg": ["Newsreader"],
              "title-sm": ["Newsreader"],
              "body-md": ["Inter"],
            },
            fontSize: {
              metadata: ["14px", { lineHeight: "1.4", fontWeight: "400" }],
              "label-caps": [
                "12px",
                {
                  lineHeight: "1.0",
                  letterSpacing: "0.1em",
                  fontWeight: "600",
                },
              ],
              "headline-md": ["32px", { lineHeight: "1.2", fontWeight: "500" }],
              "body-lg": ["18px", { lineHeight: "1.6", fontWeight: "400" }],
              "display-lg": [
                "48px",
                {
                  lineHeight: "1.1",
                  letterSpacing: "-0.02em",
                  fontWeight: "400",
                },
              ],
              "title-sm": ["24px", { lineHeight: "1.3", fontWeight: "500" }],
              "body-md": ["16px", { lineHeight: "1.5", fontWeight: "400" }],
            },
          },
        },
      };
    </script>
    <style>
      .material-symbols-outlined {
        font-variation-settings:
          "FILL" 0,
          "wght" 300,
          "GRAD" 0,
          "opsz" 24;
      }
      .search-input-focus:focus {
        outline: none;
        border-color: #000000;
      }
    </style>
  </head>
  <body
    class="bg-background text-on-background min-h-screen flex flex-col items-center justify-center selection:bg-surface-container-high"
  >
    <!-- Top Navigation Anchor (Manual suppression of full TopAppBar as per Transactional/Task-Focused rule) -->
    <div class="fixed top-0 left-0 w-full p-gutter flex justify-end">
      <button
        aria-label="Close search"
        class="flex items-center gap-xs group transition-all duration-200 opacity-60 hover:opacity-100"
      >
        <span
          class="font-label-caps text-label-caps uppercase tracking-widest mr-sm"
          >Close</span
        >
        <span class="material-symbols-outlined text-[20px]" data-icon="close"
          >close</span
        >
      </button>
    </div>
    <!-- Main Search Canvas -->
    <main class="w-full max-w-container-max px-gutter">
      <div class="flex flex-col gap-xl">
        <!-- Search Interface -->
        <div class="relative group">
          <input
            autofocus=""
            class="w-full bg-transparent border-b border-outline-variant py-md font-display-lg text-display-lg placeholder:text-outline-variant focus:border-primary transition-colors duration-300 search-input-focus"
            placeholder="Search the archive..."
            type="text"
          />
          <div
            class="mt-lg flex items-center justify-between opacity-0 group-focus-within:opacity-100 transition-opacity duration-500"
          >
            <div class="flex gap-md">
              <span
                class="font-label-caps text-label-caps text-secondary uppercase border border-outline-variant px-sm py-xs"
                >Manuscripts</span
              >
              <span
                class="font-label-caps text-label-caps text-secondary uppercase border border-outline-variant px-sm py-xs"
                >Periodicals</span
              >
              <span
                class="font-label-caps text-label-caps text-secondary uppercase border border-outline-variant px-sm py-xs"
                >Correspondence</span
              >
            </div>
            <span class="font-metadata text-metadata text-secondary italic"
              >Press enter to begin inquiry</span
            >
          </div>
        </div>
        <!-- Card Catalog Style Results Preview (Initially Empty/Subtle) -->
        <div
          class="mt-xl grid grid-cols-1 gap-md border-t border-outline-variant pt-xl opacity-20"
        >
          <div
            class="flex justify-between items-baseline border-b border-outline-variant pb-md"
          >
            <div class="flex items-baseline gap-lg">
              <span class="font-metadata text-metadata text-secondary w-[80px]"
                >ACC-1924</span
              >
              <span class="font-title-sm text-title-sm text-outline-variant"
                >The Architecture of Silence</span
              >
            </div>
            <span class="font-metadata text-metadata text-secondary"
              >Vol. I</span
            >
          </div>
          <div
            class="flex justify-between items-baseline border-b border-outline-variant pb-md"
          >
            <div class="flex items-baseline gap-lg">
              <span class="font-metadata text-metadata text-secondary w-[80px]"
                >ACC-1956</span
              >
              <span class="font-title-sm text-title-sm text-outline-variant"
                >Curating the Ephemeral</span
              >
            </div>
            <span class="font-metadata text-metadata text-secondary"
              >Vol. IV</span
            >
          </div>
          <div
            class="flex justify-between items-baseline border-b border-outline-variant pb-md"
          >
            <div class="flex items-baseline gap-lg">
              <span class="font-metadata text-metadata text-secondary w-[80px]"
                >ACC-1982</span
              >
              <span class="font-title-sm text-title-sm text-outline-variant"
                >Metaphysics of the Archive</span
              >
            </div>
            <span class="font-metadata text-metadata text-secondary"
              >Vol. IX</span
            >
          </div>
        </div>
      </div>
    </main>
    <!-- Visual Texture / Brand Detail -->
    <div
      class="fixed bottom-gutter left-gutter flex flex-col gap-xs opacity-40"
    >
      <span
        class="font-label-caps text-label-caps tracking-[0.2em] font-bold text-primary"
        >ARCHIVE</span
      >
      <span
        class="font-metadata text-metadata uppercase tracking-widest text-secondary"
        >Institutional Index v.24.1</span
      >
    </div>
  </body>
</html>
