<!doctype html>

<html class="light" lang="en">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;1,6..72,400&amp;display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "on-primary-container": "#858383",
              "on-secondary": "#ffffff",
              "on-tertiary": "#ffffff",
              "on-primary-fixed-variant": "#474746",
              "surface-variant": "#e2e2e2",
              "secondary-fixed": "#e4e2e2",
              "on-error": "#ffffff",
              "surface-container-lowest": "#ffffff",
              "surface-container-high": "#e8e8e8",
              primary: "#000000",
              "on-primary": "#ffffff",
              "surface-container": "#eeeeee",
              tertiary: "#000000",
              "inverse-surface": "#2f3131",
              "on-tertiary-container": "#838484",
              "secondary-fixed-dim": "#c7c6c6",
              "surface-container-highest": "#e2e2e2",
              "error-container": "#ffdad6",
              "secondary-container": "#e1dfdf",
              outline: "#747878",
              "on-background": "#1a1c1c",
              "outline-variant": "#c4c7c7",
              "on-tertiary-fixed-variant": "#464747",
              "on-tertiary-fixed": "#1a1c1c",
              "on-secondary-container": "#626262",
              "on-surface": "#1a1c1c",
              "tertiary-container": "#1a1c1c",
              "primary-fixed": "#e5e2e1",
              "on-error-container": "#93000a",
              "tertiary-fixed": "#e3e2e2",
              "surface-container-low": "#f4f3f3",
              "primary-container": "#1c1b1b",
              "surface-dim": "#dadada",
              background: "#f9f9f9",
              "inverse-on-surface": "#f1f1f1",
              "surface-tint": "#5f5e5e",
              surface: "#f9f9f9",
              "on-primary-fixed": "#1c1b1b",
              "inverse-primary": "#c8c6c5",
              secondary: "#5e5e5e",
              "surface-bright": "#f9f9f9",
              "primary-fixed-dim": "#c8c6c5",
              error: "#ba1a1a",
              "on-secondary-fixed": "#1b1c1c",
              "tertiary-fixed-dim": "#c7c6c6",
              "on-secondary-fixed-variant": "#464747",
              "on-surface-variant": "#444748",
            },
            borderRadius: {
              DEFAULT: "0.25rem",
              lg: "0.5rem",
              xl: "0.75rem",
              full: "9999px",
            },
            spacing: {
              "container-max": "800px",
              sm: "8px",
              lg: "32px",
              xs: "4px",
              md: "16px",
              xl: "64px",
              unit: "4px",
              gutter: "24px",
            },
            fontFamily: {
              "title-sm": ["Newsreader"],
              "label-caps": ["Inter"],
              "body-md": ["Inter"],
              metadata: ["Inter"],
              "headline-md": ["Newsreader"],
              "display-lg": ["Newsreader"],
              "body-lg": ["Inter"],
            },
            fontSize: {
              "title-sm": ["24px", { lineHeight: "1.3", fontWeight: "500" }],
              "label-caps": [
                "12px",
                {
                  lineHeight: "1.0",
                  letterSpacing: "0.1em",
                  fontWeight: "600",
                },
              ],
              "body-md": ["16px", { lineHeight: "1.5", fontWeight: "400" }],
              metadata: ["14px", { lineHeight: "1.4", fontWeight: "400" }],
              "headline-md": ["32px", { lineHeight: "1.2", fontWeight: "500" }],
              "display-lg": [
                "48px",
                {
                  lineHeight: "1.1",
                  letterSpacing: "-0.02em",
                  fontWeight: "400",
                },
              ],
              "body-lg": ["18px", { lineHeight: "1.6", fontWeight: "400" }],
            },
          },
        },
      };
    </script>
    <style>
      body {
        background-color: #f9f9f9;
        color: #1a1c1c;
        -webkit-font-smoothing: antialiased;
      }
      .material-symbols-outlined {
        font-variation-settings:
          "FILL" 0,
          "wght" 200,
          "GRAD" 0,
          "opsz" 48;
      }
      .index-card {
        border-bottom: 1px solid #e2e2e2;
      }
      .index-card:hover {
        background-color: #f4f3f3;
      }
      .vertical-spine {
        width: 1px;
        background-color: #e2e2e2;
        height: 100%;
      }
    </style>
  </head>
  <body class="selection:bg-primary selection:text-on-primary">
    <main class="w-full">
      <section
        class="h-screen w-full flex items-center justify-center bg-surface"
      >
        <button
          class="group flex flex-col items-center gap-xl transition-all duration-300 cursor-default"
        >
          <span
            class="material-symbols-outlined text-[120px] font-extralight text-primary opacity-20 group-hover:opacity-100 transition-opacity"
            data-icon="search"
            >search</span
          >
          <div class="flex flex-col items-center gap-md">
            <div class="w-[1px] h-24 bg-primary opacity-20"></div>
            <span
              class="font-label-caps text-label-caps text-secondary opacity-40 uppercase tracking-widest"
              >Scroll to explore the archive</span
            >
          </div>
        </button>
      </section>
    </main>
  </body>
</html>
